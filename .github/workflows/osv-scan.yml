name: OSV Scan

# Vulnerability status only changes when deps change or a new CVE is
# published, not on every commit — scope triggers accordingly.
on:
  push:
    branches:
      - main
      - develop
    paths:
      - "go.mod"
      - "go.sum"
      - ".github/workflows/osv-scan.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "go.mod"
      - "go.sum"
      - ".github/workflows/osv-scan.yml"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  osv-scan:
    name: OSV Scanner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install osv-scanner (prebuilt, pinned)
        run: |
          curl -sSfL "https://github.com/google/osv-scanner/releases/download/v2.4.0/osv-scanner_linux_amd64" -o osv-scanner
          chmod +x osv-scanner
          ./osv-scanner --version

      - name: Run OSV Scanner
        run: ./osv-scanner scan --lockfile=go.mod --recursive .

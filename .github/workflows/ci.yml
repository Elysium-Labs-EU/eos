name: CI

# The ci job calls `make ci` directly rather than re-declaring each check in
# YAML: the Makefile is the single source of truth for what "passing" means
# (test, lint, ast-grep, nilaway, coverage floor, go-crap change-risk gate),
# so this workflow can't silently drift from it -- previously this job only
# ran a hand-copied subset (test + coverage), skipping lint, ast-grep,
# nilaway, and the crap gate entirely on every push and PR.
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  pull-requests: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # go-crap-gate diffs changed functions against origin/main

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      # make setup does not install ast-grep (the sg target expects it
      # preinstalled, e.g. via brew locally); the npm package is the simplest
      # reliable install on a GitHub-hosted runner (node is preinstalled).
      - name: Install ast-grep
        run: npm install -g @ast-grep/cli

      - name: Install dev tools
        run: make setup

      - name: Run CI gate
        run: make ci

  integration-test:
    name: Integration Test (root + systemd)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Install dependencies
        run: go mod download

      # Root + systemd as PID 1 are required: these tests fork/exec with a
      # dropped-privilege child and manage real systemd units (under an
      # isolated unit name, never the real "eos" unit — see
      # cmd/system_integration_test.go). GitHub-hosted ubuntu-latest runners
      # are full VMs with systemd, so this replicates a real install target;
      # `go test` itself isn't run as root by default, hence the sudo.
      - name: Run integration tests
        run: sudo env "PATH=$PATH" go test ./cmd/... -tags integration -v -count=1

  verify-build:
    name: Verify Build
    runs-on: ubuntu-latest
    needs: [ci]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Verify code compiles
        run: go build -v ./...

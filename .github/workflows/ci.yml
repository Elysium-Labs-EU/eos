name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run tests
        run: go test ./... -v -race -coverprofile=coverage.out -covermode=atomic

      - name: Check coverage threshold
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/{gsub(/%/,""); print $3}')
          echo "Total coverage: ${total}%"
          awk -v total="$total" -v threshold="49" \
            'BEGIN { if (total+0 < threshold+0) { print "Coverage " total "% is below threshold " threshold "%"; exit 1 } }'

      # - name: Upload coverage
      #   uses: codecov/codecov-action@v4
      #   with:
      #     files: ./coverage.out
      #     flags: unittests
      #     fail_ci_if_error: false
      #   env:
      #     CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  integration-test:
    name: Integration Test (root + systemd)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install dependencies
        run: go mod download

      # Root + systemd as PID 1 are required: these tests fork/exec with a
      # dropped-privilege child and manage real systemd units (under an
      # isolated unit name, never the real "eos" unit — see
      # cmd/system_integration_test.go). GitHub-hosted ubuntu-latest runners
      # are full VMs with systemd, so this replicates a real install target;
      # `go test` itself isn't run as root by default, hence the sudo.
      - name: Run integration tests
        run: sudo env "PATH=$PATH" go test ./cmd/... -tags integration -v -count=1

  verify-build:
    name: Verify Build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Verify code compiles
        run: go build -v ./...

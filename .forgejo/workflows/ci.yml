name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    name: Test
    runs-on: codeberg-small
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run tests
        run: go test ./... -v -race -coverprofile=coverage.out -covermode=atomic

  integration-test:
    name: Integration Test (root + systemd)
    runs-on: codeberg-small
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: go mod download

      # codeberg-small runs jobs as root already, so no sudo needed here.
      # Tests that also require systemd as PID 1 (cmd/system_integration_test.go,
      # cmd/daemon_e2e_test.go) self-skip via requireSystemd() if this runner's
      # container doesn't have it — safe either way.
      - name: Run integration tests
        run: go test ./cmd/... -tags integration -v -count=1

  bench:
    name: Benchmarks
    runs-on: codeberg-small
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run benchmarks
        continue-on-error: true
        run: |
          mkdir -p __benchmarks__
          go test -run=^$ -bench=. -benchmem -count=5 ./... > __benchmarks__/mem.$(git rev-parse --short HEAD).txt 2>&1

      - name: Upload snapshot
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: bench-mem-${{ github.sha }}
          path: __benchmarks__/
          retention-days: 90

  verify-build:
    name: Verify Build
    runs-on: codeberg-small
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify code compiles
        run: go build -v ./...

  crap:
    name: Change-Risk Analysis (go-crap)
    runs-on: codeberg-small
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install go-crap
        run: go install github.com/padiazg/go-crap@latest

      - name: Run go-crap change-risk analysis
        run: make crap
